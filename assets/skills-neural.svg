<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" width="900" height="220">
<defs>
<style>
@keyframes np{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.2)}}
@keyframes sf{0%{stroke-dashoffset:80;opacity:0}20%{opacity:.9}80%{opacity:.9}100%{stroke-dashoffset:0;opacity:0}}
@keyframes lb{0%,100%{opacity:.6}50%{opacity:1}}
.na{animation:np 3s ease-in-out infinite}
.nb{animation:np 3s ease-in-out infinite .5s}
.nc{animation:np 3s ease-in-out infinite 1s}
.nd{animation:np 3s ease-in-out infinite 1.5s}
.ne{animation:np 3s ease-in-out infinite 2s}
.nf{animation:np 3s ease-in-out infinite 2.5s}
.sa{animation:sf 3s linear infinite}
.sb{animation:sf 3s linear infinite .5s}
.sc{animation:sf 3s linear infinite 1s}
.sd{animation:sf 3s linear infinite 1.5s}
.se{animation:sf 3s linear infinite 2s}
.lbl{animation:lb 3s ease-in-out infinite}
</style>
<filter id="gc" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="gp" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="gg" x="-50%" y="-50%" width="200%" height="200%">
<feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0a0e1a"/><stop offset="100%" stop-color="#0d1a2e"/>
</linearGradient>
</defs>

<rect width="900" height="220" fill="url(#bg)" rx="6"/>
<rect x="1" y="1" width="898" height="218" rx="5" fill="none" stroke="#00d4ff" stroke-width=".5" opacity=".2"/>

<!-- Section label -->
<text x="450" y="22" font-family="Courier New,monospace" font-size="11" fill="#00d4ff" text-anchor="middle" opacity=".6">── NEURAL PATHWAY MAP ──  [ SYNAPTIC SKILL ARCHITECTURE ]  ── NEURAL PATHWAY MAP ──</text>

<!-- ─── CONNECTIONS ─── -->
<!-- Architecture → Embedded, HDL -->
<line x1="150" y1="100" x2="310" y2="75" stroke="#00d4ff" stroke-width=".8" stroke-dasharray="5,4" opacity=".3"/>
<line x1="150" y1="100" x2="310" y2="130" stroke="#00d4ff" stroke-width=".8" stroke-dasharray="5,4" opacity=".3"/>
<!-- Embedded → AI/ML, Vision -->
<line x1="310" y1="75" x2="470" y2="75" stroke="#8b5cf6" stroke-width=".8" stroke-dasharray="5,4" opacity=".3"/>
<line x1="310" y1="130" x2="470" y2="130" stroke="#8b5cf6" stroke-width=".8" stroke-dasharray="5,4" opacity=".3"/>
<!-- AI/ML, Vision → Web, Systems -->
<line x1="470" y1="75" x2="630" y2="75" stroke="#00ff9d" stroke-width=".8" stroke-dasharray="5,4" opacity=".3"/>
<line x1="470" y1="130" x2="630" y2="130" stroke="#00ff9d" stroke-width=".8" stroke-dasharray="5,4" opacity=".3"/>
<!-- Cross connections -->
<line x1="310" y1="75" x2="470" y2="130" stroke="#8b5cf6" stroke-width=".5" stroke-dasharray="3,6" opacity=".2"/>
<line x1="470" y1="75" x2="630" y2="130" stroke="#00d4ff" stroke-width=".5" stroke-dasharray="3,6" opacity=".2"/>
<line x1="630" y1="75" x2="780" y2="110" stroke="#00ff9d" stroke-width=".8" stroke-dasharray="5,4" opacity=".3"/>
<line x1="630" y1="130" x2="780" y2="110" stroke="#00ff9d" stroke-width=".8" stroke-dasharray="5,4" opacity=".3"/>

<!-- Signal pulses -->
<line class="sa" x1="150" y1="100" x2="310" y2="75" stroke="#00d4ff" stroke-width="2" stroke-dasharray="15,65" opacity=".8"/>
<line class="sb" x1="310" y1="130" x2="470" y2="130" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="15,65" opacity=".8"/>
<line class="sc" x1="470" y1="75" x2="630" y2="75" stroke="#00ff9d" stroke-width="2" stroke-dasharray="15,65" opacity=".8"/>
<line class="sd" x1="630" y1="130" x2="780" y2="110" stroke="#00d4ff" stroke-width="2" stroke-dasharray="15,65" opacity=".8"/>
<line class="se" x1="310" y1="75" x2="470" y2="130" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="10,50" opacity=".7"/>

<!-- ─── NODES ─── -->
<!-- Node 1: Computer Architecture -->
<circle class="na" cx="150" cy="100" r="28" fill="#00d4ff" fill-opacity=".1" stroke="#00d4ff" stroke-width="1.5"/>
<circle cx="150" cy="100" r="8" fill="#00d4ff" filter="url(#gc)"/>
<text x="150" y="145" font-family="Courier New,monospace" font-size="9" fill="#00d4ff" text-anchor="middle" opacity=".9">ARCH</text>
<text x="150" y="158" font-family="Courier New,monospace" font-size="8" fill="#00d4ff" text-anchor="middle" opacity=".6">RISC-V · Pipeline</text>
<text x="150" y="170" font-family="Courier New,monospace" font-size="8" fill="#00d4ff" text-anchor="middle" opacity=".6">Neuromorphic</text>

<!-- Node 2: Embedded -->
<circle class="nb" cx="310" cy="75" r="24" fill="#8b5cf6" fill-opacity=".1" stroke="#8b5cf6" stroke-width="1.5"/>
<circle cx="310" cy="75" r="7" fill="#8b5cf6" filter="url(#gp)"/>
<text x="310" y="115" font-family="Courier New,monospace" font-size="9" fill="#8b5cf6" text-anchor="middle" opacity=".9">EMBEDDED</text>
<text x="310" y="127" font-family="Courier New,monospace" font-size="8" fill="#8b5cf6" text-anchor="middle" opacity=".6">Arduino · ESP32</text>
<text x="310" y="139" font-family="Courier New,monospace" font-size="8" fill="#8b5cf6" text-anchor="middle" opacity=".6">Verilog HDL</text>

<!-- Node 3: HDL -->
<circle class="nc" cx="310" cy="130" r="24" fill="#00d4ff" fill-opacity=".1" stroke="#00d4ff" stroke-width="1.5"/>
<circle cx="310" cy="130" r="7" fill="#00d4ff" filter="url(#gc)"/>
<text x="310" y="50" font-family="Courier New,monospace" font-size="9" fill="#00d4ff" text-anchor="middle" opacity=".9">HDL</text>
<text x="310" y="38" font-family="Courier New,monospace" font-size="8" fill="#00d4ff" text-anchor="middle" opacity=".6">Verilog · FPGA</text>
<text x="310" y="26" font-family="Courier New,monospace" font-size="8" fill="#00d4ff" text-anchor="middle" opacity=".6">Synopsys EDA</text>

<!-- Node 4: AI/ML -->
<circle class="nd" cx="470" cy="75" r="24" fill="#00ff9d" fill-opacity=".1" stroke="#00ff9d" stroke-width="1.5"/>
<circle cx="470" cy="75" r="7" fill="#00ff9d" filter="url(#gg)"/>
<text x="470" y="115" font-family="Courier New,monospace" font-size="9" fill="#00ff9d" text-anchor="middle" opacity=".9">AI / ML</text>
<text x="470" y="127" font-family="Courier New,monospace" font-size="8" fill="#00ff9d" text-anchor="middle" opacity=".6">TF · PyTorch</text>
<text x="470" y="139" font-family="Courier New,monospace" font-size="8" fill="#00ff9d" text-anchor="middle" opacity=".6">pandas · NumPy</text>

<!-- Node 5: Vision -->
<circle class="ne" cx="470" cy="130" r="24" fill="#8b5cf6" fill-opacity=".1" stroke="#8b5cf6" stroke-width="1.5"/>
<circle cx="470" cy="130" r="7" fill="#8b5cf6" filter="url(#gp)"/>
<text x="470" y="50" font-family="Courier New,monospace" font-size="9" fill="#8b5cf6" text-anchor="middle" opacity=".9">VISION</text>
<text x="470" y="38" font-family="Courier New,monospace" font-size="8" fill="#8b5cf6" text-anchor="middle" opacity=".6">OpenCV · CNN</text>
<text x="470" y="26" font-family="Courier New,monospace" font-size="8" fill="#8b5cf6" text-anchor="middle" opacity=".6">Shadow Removal</text>

<!-- Node 6: Web -->
<circle class="na" cx="630" cy="75" r="24" fill="#00d4ff" fill-opacity=".1" stroke="#00d4ff" stroke-width="1.5"/>
<circle cx="630" cy="75" r="7" fill="#00d4ff" filter="url(#gc)"/>
<text x="630" y="115" font-family="Courier New,monospace" font-size="9" fill="#00d4ff" text-anchor="middle" opacity=".9">WEB</text>
<text x="630" y="127" font-family="Courier New,monospace" font-size="8" fill="#00d4ff" text-anchor="middle" opacity=".6">React · Next.js</text>
<text x="630" y="139" font-family="Courier New,monospace" font-size="8" fill="#00d4ff" text-anchor="middle" opacity=".6">Node · Express</text>

<!-- Node 7: Systems/Cloud -->
<circle class="nb" cx="630" cy="130" r="24" fill="#00ff9d" fill-opacity=".1" stroke="#00ff9d" stroke-width="1.5"/>
<circle cx="630" cy="130" r="7" fill="#00ff9d" filter="url(#gg)"/>
<text x="630" y="50" font-family="Courier New,monospace" font-size="9" fill="#00ff9d" text-anchor="middle" opacity=".9">CLOUD</text>
<text x="630" y="38" font-family="Courier New,monospace" font-size="8" fill="#00ff9d" text-anchor="middle" opacity=".6">AWS IoT · GCP</text>
<text x="630" y="26" font-family="Courier New,monospace" font-size="8" fill="#00ff9d" text-anchor="middle" opacity=".6">MQTT · Docker</text>

<!-- Node 8: Output — Core Identity -->
<circle cx="780" cy="110" r="36" fill="none" stroke="#00d4ff" stroke-width="1" opacity=".3"/>
<circle cx="780" cy="110" r="28" fill="#00d4ff" fill-opacity=".08" stroke="#00d4ff" stroke-width="1.5"/>
<circle class="nf" cx="780" cy="110" r="10" fill="#00d4ff" filter="url(#gc)"/>
<text x="780" y="160" font-family="Courier New,monospace" font-size="10" fill="#00d4ff" text-anchor="middle" opacity=".9" font-weight="bold">INNOVATOR</text>
<text x="780" y="174" font-family="Courier New,monospace" font-size="8" fill="#00d4ff" text-anchor="middle" opacity=".6">OUTPUT NODE</text>
</svg>
