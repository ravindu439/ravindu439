<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
<defs>
<style>
@keyframes nodeFloat{0%,100%{opacity:.5;r:5px}50%{opacity:1;r:8px}}
@keyframes signalFlow{0%{stroke-dashoffset:80;opacity:0}15%{opacity:1}85%{opacity:1}100%{stroke-dashoffset:0;opacity:0}}
@keyframes scanLine{0%{transform:translateY(-10px);opacity:0}5%{opacity:.05}95%{opacity:.05}100%{transform:translateY(330px);opacity:0}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes borderGlow{0%,100%{opacity:.25}50%{opacity:.7}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.n1{animation:nodeFloat 2.8s ease-in-out infinite}
.n2{animation:nodeFloat 2.8s ease-in-out infinite .5s}
.n3{animation:nodeFloat 2.8s ease-in-out infinite 1s}
.n4{animation:nodeFloat 2.8s ease-in-out infinite 1.5s}
.n5{animation:nodeFloat 2.8s ease-in-out infinite .3s}
.n6{animation:nodeFloat 2.8s ease-in-out infinite .8s}
.n7{animation:nodeFloat 2.8s ease-in-out infinite 1.3s}
.n8{animation:nodeFloat 2.8s ease-in-out infinite .6s}
.n9{animation:nodeFloat 2.8s ease-in-out infinite 1.1s}
.s1{animation:signalFlow 2.2s linear infinite}
.s2{animation:signalFlow 2.2s linear infinite .7s}
.s3{animation:signalFlow 2.2s linear infinite 1.4s}
.s4{animation:signalFlow 2.2s linear infinite .4s}
.scan{animation:scanLine 6s linear infinite}
.cur{animation:blink 1s step-end infinite}
.br{animation:borderGlow 3s ease-in-out infinite}
.fi{animation:fadeIn .8s ease forwards}
.fi1{animation:fadeIn .8s ease .2s both}
.fi2{animation:fadeIn .8s ease .4s both}
.fi3{animation:fadeIn .8s ease .6s both}
.fi4{animation:fadeIn .8s ease .8s both}
</style>
<filter id="gc" x="-40%" y="-40%" width="180%" height="180%">
<feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="gp" x="-40%" y="-40%" width="180%" height="180%">
<feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="gt" x="-10%" y="-40%" width="120%" height="180%">
<feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0a0e1a"/><stop offset="50%" stop-color="#0d1a2e"/><stop offset="100%" stop-color="#0a0e1a"/>
</linearGradient>
<linearGradient id="ng" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#00d4ff"/><stop offset="100%" stop-color="#8b5cf6"/>
</linearGradient>
<linearGradient id="lp" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#00d4ff" stop-opacity=".04"/><stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
</linearGradient>
<linearGradient id="rp" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#8b5cf6" stop-opacity="0"/><stop offset="100%" stop-color="#8b5cf6" stop-opacity=".07"/>
</linearGradient>
</defs>

<!-- BG -->
<rect width="900" height="320" fill="url(#bg)"/>
<rect width="580" height="320" fill="url(#lp)"/>
<rect x="580" width="320" height="320" fill="url(#rp)"/>

<!-- Grid -->
<g stroke="#00d4ff" stroke-width=".3" opacity=".07">
<line x1="0" y1="40" x2="900" y2="40"/><line x1="0" y1="80" x2="900" y2="80"/>
<line x1="0" y1="120" x2="900" y2="120"/><line x1="0" y1="160" x2="900" y2="160"/>
<line x1="0" y1="200" x2="900" y2="200"/><line x1="0" y1="240" x2="900" y2="240"/>
<line x1="0" y1="280" x2="900" y2="280"/>
<line x1="80" y1="0" x2="80" y2="320"/><line x1="160" y1="0" x2="160" y2="320"/>
<line x1="240" y1="0" x2="240" y2="320"/><line x1="320" y1="0" x2="320" y2="320"/>
<line x1="400" y1="0" x2="400" y2="320"/><line x1="480" y1="0" x2="480" y2="320"/>
<line x1="560" y1="0" x2="560" y2="320"/><line x1="640" y1="0" x2="640" y2="320"/>
<line x1="720" y1="0" x2="720" y2="320"/><line x1="800" y1="0" x2="800" y2="320"/>
</g>

<!-- Scanline -->
<rect class="scan" x="0" y="0" width="900" height="4" fill="#00d4ff" opacity=".05"/>

<!-- LEFT CIRCUIT DECORATIONS -->
<g fill="none" stroke="#00d4ff" stroke-width="1" opacity=".3">
<polyline points="22,25 22,70 55,70"/><circle cx="55" cy="70" r="3" fill="#00d4ff" opacity=".5"/>
<polyline points="22,295 22,255 55,255"/><circle cx="55" cy="255" r="3" fill="#00d4ff" opacity=".5"/>
<polyline points="30,160 48,160 48,145 62,145"/><circle cx="62" cy="145" r="2" fill="#8b5cf6" opacity=".7"/>
<polyline points="30,160 48,160 48,175 62,175"/><circle cx="62" cy="175" r="2" fill="#8b5cf6" opacity=".7"/>
</g>

<!-- ═══ NEURAL NETWORK (RIGHT SIDE) ═══ -->
<!-- Connections L1→L2 -->
<g stroke="#8b5cf6" stroke-width=".8" opacity=".4">
<line x1="688" y1="80" x2="748" y2="120"/><line x1="688" y1="80" x2="748" y2="160"/>
<line x1="688" y1="80" x2="748" y2="200"/>
<line x1="688" y1="160" x2="748" y2="120"/><line x1="688" y1="160" x2="748" y2="160"/>
<line x1="688" y1="160" x2="748" y2="200"/>
<line x1="688" y1="240" x2="748" y2="120"/><line x1="688" y1="240" x2="748" y2="160"/>
<line x1="688" y1="240" x2="748" y2="200"/>
</g>
<!-- Connections L2→L3 -->
<g stroke="#8b5cf6" stroke-width=".8" opacity=".4">
<line x1="748" y1="120" x2="810" y2="100"/><line x1="748" y1="120" x2="810" y2="160"/>
<line x1="748" y1="120" x2="810" y2="220"/>
<line x1="748" y1="160" x2="810" y2="100"/><line x1="748" y1="160" x2="810" y2="160"/>
<line x1="748" y1="160" x2="810" y2="220"/>
<line x1="748" y1="200" x2="810" y2="100"/><line x1="748" y1="200" x2="810" y2="160"/>
<line x1="748" y1="200" x2="810" y2="220"/>
</g>
<!-- Connections L3→Output -->
<g stroke="#00d4ff" stroke-width=".8" opacity=".4">
<line x1="810" y1="100" x2="858" y2="160"/><line x1="810" y1="160" x2="858" y2="160"/>
<line x1="810" y1="220" x2="858" y2="160"/>
</g>

<!-- Signal pulses -->
<line class="s1" x1="688" y1="160" x2="748" y2="160" stroke="#00d4ff" stroke-width="2" stroke-dasharray="20,60" opacity=".9"/>
<line class="s2" x1="748" y1="120" x2="810" y2="100" stroke="#00ff9d" stroke-width="2" stroke-dasharray="20,60" opacity=".9"/>
<line class="s3" x1="688" y1="80" x2="748" y2="200" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="20,60" opacity=".9"/>
<line class="s4" x1="810" y1="220" x2="858" y2="160" stroke="#00d4ff" stroke-width="2" stroke-dasharray="20,60" opacity=".9"/>

<!-- Nodes L1 (input) -->
<circle class="n1" cx="688" cy="80" r="5" fill="#00d4ff" filter="url(#gc)"/>
<circle class="n2" cx="688" cy="160" r="5" fill="#8b5cf6" filter="url(#gp)"/>
<circle class="n3" cx="688" cy="240" r="5" fill="#00ff9d" filter="url(#gc)"/>
<!-- Nodes L2 (hidden) -->
<circle class="n4" cx="748" cy="120" r="5" fill="#00d4ff" filter="url(#gc)"/>
<circle class="n5" cx="748" cy="160" r="5" fill="#8b5cf6" filter="url(#gp)"/>
<circle class="n6" cx="748" cy="200" r="5" fill="#00ff9d" filter="url(#gc)"/>
<!-- Nodes L3 -->
<circle class="n7" cx="810" cy="100" r="5" fill="#8b5cf6" filter="url(#gp)"/>
<circle class="n8" cx="810" cy="160" r="5" fill="#00d4ff" filter="url(#gc)"/>
<circle class="n9" cx="810" cy="220" r="5" fill="#00ff9d" filter="url(#gc)"/>
<!-- Output node -->
<circle cx="858" cy="160" r="10" fill="none" stroke="#00d4ff" stroke-width="1.5" filter="url(#gc)" opacity=".8"/>
<circle cx="858" cy="160" r="5" fill="#00d4ff" filter="url(#gc)"/>

<!-- Node labels -->
<text x="672" y="77" font-family="Courier New,monospace" font-size="8" fill="#00d4ff" opacity=".6" text-anchor="end">SEN</text>
<text x="672" y="157" font-family="Courier New,monospace" font-size="8" fill="#8b5cf6" opacity=".6" text-anchor="end">MEM</text>
<text x="672" y="237" font-family="Courier New,monospace" font-size="8" fill="#00ff9d" opacity=".6" text-anchor="end">ACT</text>
<text x="877" y="163" font-family="Courier New,monospace" font-size="8" fill="#00d4ff" opacity=".8">OUT</text>

<!-- Neural divider line -->
<line x1="660" y1="20" x2="660" y2="300" stroke="#00d4ff" stroke-width=".5" opacity=".15"/>

<!-- ═══ LEFT TEXT CONTENT ═══ -->
<!-- System label top -->
<text class="fi" x="88" y="42" font-family="Courier New,monospace" font-size="10" fill="#8b5cf6" opacity=".85" filter="url(#gp)">NEURAL-OS v2.4.7  |  SYNAPTIC INTERFACE ACTIVE</text>

<!-- Terminal prompt -->
<text class="fi1" x="88" y="65" font-family="Courier New,monospace" font-size="10" fill="#00d4ff" opacity=".55">root@neural-node:~$ identify --user --deep-scan</text>

<!-- Main name -->
<text class="fi2" x="82" y="128" font-family="Arial Black,Arial,sans-serif" font-size="50" font-weight="900" fill="url(#ng)" filter="url(#gt)" letter-spacing="1">RAVINDU</text>
<text class="fi2" x="82" y="178" font-family="Arial Black,Arial,sans-serif" font-size="50" font-weight="900" fill="#e6edf3" opacity=".92" letter-spacing="1">LAKSHAN</text>

<!-- Subtitle -->
<text class="fi3" x="88" y="207" font-family="Courier New,monospace" font-size="12" fill="#00ff9d" filter="url(#gc)" opacity=".9">⬡ Computer Engineering  ·  ⬡ Neuromorphic Systems  ·  ⬡ Embedded AI</text>

<!-- Status badges -->
<g class="fi4" transform="translate(88,222)">
<rect width="82" height="20" rx="4" fill="#00ff9d" fill-opacity=".12" stroke="#00ff9d" stroke-width=".8" opacity=".8"/>
<text x="41" y="14" font-family="Courier New,monospace" font-size="10" fill="#00ff9d" text-anchor="middle">● ONLINE</text>

<rect x="94" width="140" height="20" rx="4" fill="#8b5cf6" fill-opacity=".12" stroke="#8b5cf6" stroke-width=".8" opacity=".8"/>
<text x="164" y="14" font-family="Courier New,monospace" font-size="10" fill="#8b5cf6" text-anchor="middle">⚡ SYNAPSES ACTIVE</text>

<rect x="246" width="130" height="20" rx="4" fill="#00d4ff" fill-opacity=".12" stroke="#00d4ff" stroke-width=".8" opacity=".8"/>
<text x="311" y="14" font-family="Courier New,monospace" font-size="10" fill="#00d4ff" text-anchor="middle">🎓 4TH YEAR NODE</text>
</g>

<!-- Info lines -->
<text class="fi4" x="88" y="268" font-family="Courier New,monospace" font-size="9.5" fill="#00d4ff" opacity=".4">[ NODE ] University of Peradeniya, Sri Lanka</text>
<text class="fi4" x="88" y="284" font-family="Courier New,monospace" font-size="9.5" fill="#00d4ff" opacity=".4">[ LINK ] e20439@eng.pdn.ac.lk  |  github.com/ravindu439</text>

<!-- Blinking cursor -->
<rect class="cur" x="88" y="292" width="7" height="2" fill="#00d4ff" opacity=".8"/>

<!-- Border frame -->
<rect class="br" x="2" y="2" width="896" height="316" rx="6" fill="none" stroke="#00d4ff" stroke-width="1"/>
<rect x="6" y="6" width="888" height="308" rx="4" fill="none" stroke="#8b5cf6" stroke-width=".4" opacity=".2"/>

<!-- Corner accents -->
<g fill="#00d4ff" opacity=".6">
<rect x="2" y="2" width="20" height="2"/><rect x="2" y="2" width="2" height="20"/>
<rect x="878" y="2" width="20" height="2"/><rect x="896" y="2" width="2" height="20"/>
<rect x="2" y="316" width="20" height="2"/><rect x="2" y="298" width="2" height="20"/>
<rect x="878" y="316" width="20" height="2"/><rect x="896" y="298" width="2" height="20"/>
</g>
</svg>
